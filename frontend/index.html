<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">

      <!-- Auth: shows user info when logged in, forms when logged out -->
      <div id="user-info" class="user-info hidden">
        <span id="username-display"></span>
        <button id="logout-btn" class="auth-button">Logout</button>
      </div>

      <div id="auth-section">
        <div class="auth-buttons">
          <button id="show-login-btn" class="auth-button">Login</button>
          <button id="show-register-btn" class="auth-button">Register</button>
        </div>

        <form id="login-form" class="auth-form hidden">
          <h2>Login</h2>
          <input type="text" name="login" placeholder="Username or email" required autocomplete="username" />
          <input type="password" name="password" placeholder="Password" required autocomplete="current-password" />
          <p class="error hidden" id="login-error"></p>
          <button type="submit" class="auth-button">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <h2>Register</h2>
          <input type="text" name="username" placeholder="Username" required minlength="2" maxlength="30" autocomplete="username" />
          <input type="email" name="email" placeholder="Email" required autocomplete="email" />
          <input type="password" name="password" placeholder="Password" required autocomplete="new-password" />
          <p class="error hidden" id="register-error"></p>
          <button type="submit" class="auth-button">Register</button>
        </form>
      </div>

      <p id="global-error" class="error hidden"></p>

      <!-- Post new message -->
      <p id="login-prompt">Log in to write a message</p>

      <div id="post-form-wrapper" class="post-wrapper hidden">
        <p>What's making you happy right now?</p>
        <form id="post-form">
          <textarea id="post-textarea" rows="3" placeholder="Write your message here..."></textarea>
          <p class="error" id="post-error"></p>
          <button type="submit" id="submit-post-btn" aria-label="button for submitting your post">
            <span class="emoji">&#x2665;</span>
            Send message
            <span class="emoji">&#x2665;</span>
          </button>
        </form>
      </div>

      <!-- Message list (populated by JS) -->
      <div id="message-list"></div>

    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
